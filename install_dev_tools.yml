---
- name: Configure the application environment
  hosts: app_servers
  become: yes

  tasks:
    - name: Install required runtime environments
      apt:
        name:
          - apt-transport-https
          - nodejs
          - npm
          - redis-server
          - rabbitmq-server
          - postgresql
          - postgresql-contrib
        state: present
        update_cache: yes

    - name: Step 1 - Download the Microsoft repository configuration
      get_url:
        url: "https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb"
        dest: /tmp/packages-microsoft-prod.deb

    - name: Step 2 - Install Microsoft repository package
      apt:
        deb: /tmp/packages-microsoft-prod.deb
      ignore_errors: yes

    - name: Step 3 - Update apt cache
      apt:
        update_cache: yes

    - name: Step 4 - Download .NET installation script
      get_url:
        url: https://dot.net/v1/dotnet-install.sh
        dest: /tmp/dotnet-install.sh
        mode: '0755'

    - name: Step 5 - Run script and installation .NET 10
      command: /tmp/dotnet-install.sh --channel 10.0 --install-dir /usr/share/dotnet
      args:
        creates: /usr/share/dotnet/host/fxr/10.0.0
